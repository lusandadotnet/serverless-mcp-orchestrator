name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Azure Developer CLI environment name
        run: |
          if [ -z "${AZURE_ENV_NAME}" ]; then
            echo "::error::Set the GitHub repository variable AZURE_ENV_NAME to your azd environment (for example sarb-orchestrator-99). See README."
            exit 1
          fi
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy application
        run: azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
