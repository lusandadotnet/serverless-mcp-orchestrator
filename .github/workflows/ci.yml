name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore, build, test (.NET)
        run: |
          dotnet restore serverless-mcp-orchestrator.sln
          dotnet build serverless-mcp-orchestrator.sln -c Release --no-restore
          dotnet test serverless-mcp-orchestrator.sln -c Release --no-build --verbosity normal

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/McpOrchestrator/requirements.txt

      - name: Install Python test dependencies
        run: pip install -r src/McpOrchestrator/requirements.txt

      - name: pytest (MCP)
        working-directory: src/McpOrchestrator
        run: pytest -q
